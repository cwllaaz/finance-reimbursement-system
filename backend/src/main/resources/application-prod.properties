spring.application.name=finance-backend

server.port=${SERVER_PORT:8080}

spring.datasource.url=jdbc:mysql://${MYSQL_HOST:127.0.0.1}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:finance_reimbursement}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
spring.datasource.username=${MYSQL_USER:finance_app}
spring.datasource.password=${MYSQL_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

app.upload-dir=${APP_UPLOAD_DIR:/opt/finance-reimbursement-system/uploads}
app.auth-token-ttl-minutes=${AUTH_TOKEN_TTL_MINUTES:120}

baidu.ocr.api-key=${BAIDU_OCR_API_KEY:}
baidu.ocr.secret-key=${BAIDU_OCR_SECRET_KEY:}
