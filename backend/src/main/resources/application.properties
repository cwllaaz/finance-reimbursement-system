spring.application.name=finance-backend

server.port=8080

spring.datasource.url=jdbc:mysql://localhost:3306/finance_reimbursement?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
spring.datasource.username=root
spring.datasource.password=${MYSQL_ROOT_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

app.upload-dir=${APP_UPLOAD_DIR:uploads}

baidu.ocr.api-key=${BAIDU_OCR_API_KEY:}
baidu.ocr.secret-key=${BAIDU_OCR_SECRET_KEY:}
